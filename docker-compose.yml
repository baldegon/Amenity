services:
  db:
     image: postgres:16-alpine
     container_name: reservas-db-postgres
     restart: always
     environment:
        - POSTGRES_USER=admin
        - POSTGRES_PASSWORD=admin123
        - POSTGRES_DB=reservas_db
     ports:
       - "5432:5432"
     volumes:
       - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
